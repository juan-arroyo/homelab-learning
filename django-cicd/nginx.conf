# Nginx configuration for django-cicd practice project

upstream django {
    # Gunicorn runs inside the container on port 8000
    server web:8000;
}

server {
    # Nginx listens on port 80
    listen 80;

    location / {
        # Forward all requests to Gunicorn
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}