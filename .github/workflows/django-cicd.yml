# Workflow that builds and deploys the Django practice project using Docker Compose
name: Django CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'django-cicd/**'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Clone repository
        uses: actions/checkout@v4

      - name: Stop and remove existing containers
        run: |
          cd django-cicd
          # Stop containers if running — '|| true' prevents failure if they don't exist
          docker compose down || true

      - name: Build and start containers
        run: |
          cd django-cicd
          # Build images and start all containers in background
          docker compose up -d --build

      - name: Verify containers are running
        run: |
          sleep 3
          docker compose -f django-cicd/docker-compose.yml ps