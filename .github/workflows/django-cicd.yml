# Workflow that tests and deploys the Django practice project
name: Django CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'django-cicd/**'   # Only triggers when files in this folder change

jobs:
  deploy:
    runs-on: self-hosted   # Runs on the Pi, not GitHub's servers

    steps:

      - name: Clone repository
        uses: actions/checkout@v4   # Downloads the repo code onto the Pi

      - name: Install dependencies for testing
        run: |
          cd django-cicd
          # Install dependencies directly on the Pi (not inside Docker)
          # --break-system-packages required on Debian/Raspberry Pi OS
          pip3 install -r requirements.txt --break-system-packages

      - name: Run tests
        run: |
          cd django-cicd
          # Run Django's built-in test runner
          # If any test fails, the pipeline stops here and deploy is skipped
          python manage.py test --verbosity=2

      - name: Stop and remove existing containers
        # Only reaches this step if all tests passed
        run: |
          cd django-cicd
          # || true prevents failure if containers don't exist yet
          docker compose down || true

      - name: Build and start containers
        run: |
          cd django-cicd
          # --build forces Docker to rebuild the image with latest code
          docker compose up -d --build

      - name: Verify containers are running
        run: |
          sleep 3   # Wait for containers to fully start
          docker compose -f django-cicd/docker-compose.yml ps