# Workflow name — appears in the GitHub Actions tab
name: Hello World

on:
  push:                    # triggers on git push
    branches:
      - main               # only on pushes to main branch

jobs:
  greet:                   # job name (can be anything)
    runs-on: self-hosted   # KEY: uses YOUR runner on the Pi, not GitHub's servers

    steps:                 # steps inside the job, executed in order

      - name: Show date and hostname
        run: |
          echo "Workflow executed at: $(date)"
          echo "On machine: $(hostname)"
          echo "By user: $(whoami)"

      - name: Show Pi info
        run: |
          echo "Architecture: $(uname -m)"
          echo "Kernel: $(uname -r)"